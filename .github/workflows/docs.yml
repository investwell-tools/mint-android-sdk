name: Deploy Docs

on:
  push:
    branches:
      - laxmi/aar2-1-7

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install MkDocs
        run: |
          pip install mkdocs
          pip install mkdocs-material

      - name: Deploy Docs
        run: mkdocs gh-deploy --force